<!DOCTYPE html>
<meta charset="utf-8">
<title>留言板</title>
<style>
  body{max-width:500px;margin:30px auto}
  input,button{width:100%;margin:5px 0;padding:8px}
  .msg{background:#f5f5f5;padding:10px;margin:5px 0}
</style>

<div id="login">
  <input id="user" placeholder="1234">
  <input id="pwd" type="password" placeholder="1234">
  <button onclick="login()">进入</button>
</div>

<div id="board" style="display:none">
  <div id="list"></div>
  <input id="text" placeholder="写留言">
  <button onclick="send()">发送</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/leancloud-storage@4/dist/av-min.js"></script>
<script>
// ========== 换成你自己的 ==========
const APP_ID = '你的AppID'
const APP_KEY = '你的AppKey'
const PASS = '123456' // 网页密码
// =================================

AV.init({ appId: APP_ID, appKey: APP_KEY })
const Msg = AV.Object.extend('Msg')

let username = ''

function login() {
  let u = document.getElementById('user').value
  let p = document.getElementById('pwd').value
  if (!u || p !== PASS) return alert('密码错误')
  username = u
  document.getElementById('login').style.display = 'none'
  document.getElementById('board').style.display = 'block'
  load()
}

async function send() {
  let text = document.getElementById('text').value
  if (!text) return
  let msg = new Msg()
  msg.set('user', username)
  msg.set('text', text)
  await msg.save()
  document.getElementById('text').value = ''
  load()
}

async function load() {
  let { results } = await new AV.Query(Msg).descending('createdAt').find()
  document.getElementById('list').innerHTML = results.map(m => `
    <div class="msg">
      <div>${m.get('user')}</div>
      <div>${m.get('text')}</div>
    </div>
  `).join('')
}
</script>
